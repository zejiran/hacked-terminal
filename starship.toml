"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette = "catppuccin_macchiato"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo  = "#f0c6c6"
pink      = "#f5bde6"
mauve     = "#c6a0f6"
red       = "#ed8796"
maroon    = "#ee99a0"
peach     = "#f5a97f"
yellow    = "#eed49f"
green     = "#a6da95"
teal      = "#8bd5ca"
sky       = "#91d7e3"
sapphire  = "#7dc4e4"
blue      = "#8aadf4"
lavender  = "#b7bdf8"
text      = "#cad3f5"
subtext1  = "#b8c0e0"
subtext0  = "#a5adcb"
overlay2  = "#939ab7"
overlay1  = "#8087a2"
overlay0  = "#6e738d"
surface2  = "#5b6078"
surface1  = "#494d64"
surface0  = "#363a4f"
base      = "#24273a"
mantle    = "#1e2030"
crust     = "#181926"

[package]
disabled = true

[character]
success_symbol = "[❯❯](bold green)"
error_symbol   = "[❯❯](bold red)"

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true

[cmd_duration]
min_time = 4000
show_milliseconds = false
disabled = false
format = " 🕙 [$duration]($style) "
style = "bold italic peach"

[container]
format = '[$symbol \[$name\]]($style) '
style  = "bold mauve"

[git_branch]
symbol = '🌱 '
style  = "bold mauve"

[git_commit]
commit_hash_length = 4
tag_symbol = '🔖 '
style = "bold green"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[🍒 PICKING](bold red)'
style = "bold yellow"

[git_metrics]
added_style   = 'bold green'
deleted_style = 'bold red'
disabled = false
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[git_status]
style       = "bold red"
conflicted  = '🏳'
ahead       = '⇡${count}'
diverged    = '⇕⇡${ahead_count}⇣${behind_count}'
behind      = '⇣${count}'
up_to_date  = '[✓](green)'
untracked   = '🤷'
stashed     = '📦'
modified    = '📝'
staged      = '[++\($count\)](green)'
renamed     = '👅'
deleted     = '🗑'

[hostname]
ssh_only = true
style = "bold yellow"

[username]
style_user = "bold lavender"
style_root = "bold red"

[battery]
full_symbol         = '🔋 '
charging_symbol     = '⚡️ '
discharging_symbol  = '💀 '

[[battery.display]]
threshold = 10
style = 'bold red'

[[battery.display]]
threshold = 30
style = 'bold yellow'
discharging_symbol = '💦 '
